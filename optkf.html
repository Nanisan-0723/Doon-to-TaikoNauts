<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Optkf to TaikøNauts</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "RocknRoll One", sans-serif;
    background: linear-gradient(135deg, #e6f4ea, #c8e6c9);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #ffffff;
    width: 720px;
    max-width: 95%;
    padding: 40px 50px;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    text-align: center;
  }

  h1 {
    margin-top: 0;
    font-size: 48px;
    color: #2e7d32;
  }

  .subtitle {
    font-size: 22px;
    color: #4e6e52;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .file-box {
    margin: 30px 0;
    padding: 25px;
    border: 2px dashed #81c784;
    border-radius: 16px;
    background: #f1f8f4;
  }

  input[type="file"] {
    font-size: 18px;
  }

  button {
    margin-top: 25px;
    font-size: 26px;
    padding: 16px 60px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #43a047, #2e7d32);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  #status {
    margin-top: 25px;
    font-size: 22px;
    color: #1b5e20;
    background: #e8f5e9;
    padding: 14px;
    border-radius: 12px;
    display: none;
  }

  .footer {
    margin-top: 35px;
    font-size: 14px;
    color: #78909c;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Optkf → TaikøNauts</h1>
    <div class="subtitle">
      OpenTaiko (FullHD) 用マイドンを<br>
      TaikøNauts 用に(無理やり)変換するツールです
    </div>

    <div class="file-box">
      <input type="file" id="folderInput" webkitdirectory multiple>
    </div>

    <button onclick="processFiles()">変換</button>

    <div id="status">変換中…（結構長い）</div>

    <div class="footer">
      「optkf」という名前の色々入ったフォルダをアップロードしてください<br>optkfしかいらんくね？OpenTaiko(HD)とかTNDEとか使うやついんの？<br>外部にアップロードはしてません(やり方わからんし)
    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const folderMap = {
      "Title_Entry": "entry_loop",
      "10combo": "10combo",
      "10combo_Max": "10combomax",
      "Balloon_Breaking": "balloon_breaking",
      "Balloon_Broke": "balloon_broke",
      "Balloon_Miss": "balloon_miss",
      "Clear": "clear",
      "Clearin": "clearin",
      "Dan_Select_In": "dan_select_in",
      "Return": "combocut",
      "MissDown": "failed_loop",
      "ClearOut": "failed_down",
      "GoGo": "gogo",
      "GoGoStart": "gogostart",
      "Miss": "miss_loop",
      "Normal": "normal",
      "Result_Clear": "result_clear_loop",
      "Result_Failed": "result_failed_loop",
      "Result_Failed_In": "result_failed_in",
      "Result_Normal": "result_loop",
      "Menu_Loop": "songselect_loop",
      "Menu_Wait": "songselect_wait_loop",
      "Soulin": "soulin"
    };

    const configJson = {
      "name":"optkf",
      "entryX":[-163,1297],
      "entryY":[290,290],
      "entryPlaySideX":458,
      "entryPlaySideY":-160,
      "entryScale":1.31,
      "entryLoopPlaySideTime":800,
      "entryModeLoopTime":500,
      "entryModeDecideLoopTime":1000,
      "songSelectX":[-154,1300],
      "songSelectY":[304,304],
      "songSelectScale":1.28,
      "songSelectLoopTime":1000,
      "songSelectDecideTime":1000,
      "songSelectSkipMotionTime":1000,
      "songSelectWaitLoopTime":560,
      "songSelectSongStartTime":360,
      "songSelectSongStartJumpIndex":21,
      "ensoGameX":[-41,-41],
      "ensoGameY":[-200,605],
      "ensoGameBalloonX":[220,220],
      "ensoGameBalloonY":[-229,225],
      "ensoGameNormalScale":1,
      "ensoGameBalloonScale":1,
      "goGoStartMotionFromBeginning":true,
      "normalMotionBeat":4,
      "combo10MotionBeat":2,
      "combo10MaxMotionBeat":2,
      "goGoStartMotionBeat":2,
      "goGoMotionMotionBeat":8,
      "clearInMotionBeat":2,
      "clearMotionBeat":2,
      "soulInMotionBeat":2,
      "comboCutMotionBeat":2,
      "missLoopMotionBeat":1,
      "failedLoopMotionBeat":1,
      "resultX":[-32,1401],
      "resultY":[462,462],
      "resultScale":0.9174311927,
      "resultLoopTime":500,
      "resultClearLoopTime":700,
      "resultFailedInTime":200,
      "resultFailedLoopTime":500,
      "danSelectX":0,
      "danSelectY":0,
      "danSelectScale":1,
      "danSelectLoopTime":1000,
      "danSelectWaitLoopTime":1000,
      "danSelectDecideTime":1000,
      "danSelectSongStartJumpIndex":1,
      "danSelectSongStartTime":1000,
      "danresultX":0,
      "danresultY":0,
      "danresultScale":1,
      "danresultNormalLoopTime":1000,
      "danresultFailedInTime":1000,
      "danresultFailedLoopTime":1000,
      "danresultRedInTime":1000,
      "danresultRedLoopTime":1000,
      "danresultGoldInTime":1000,
      "danresultGoldLoopTime":1000,
      "playerCustomizeX":[-37,1413],
      "playerCustomizeY":[510,510]
    };

async function processFiles() {
  const status = document.getElementById("status");
  const button = document.querySelector("button");

  status.style.display = "block";
  status.textContent = "変換中…(これが結構長いのよ)";
  button.disabled = true;

  const files = document.getElementById("folderInput").files;
  if (!files.length) {
    status.style.display = "none";
    button.disabled = false;
    alert("フォルダを選択してね");
    return;
  }

  const zip = new JSZip();

  const filesByFolder = {};

  for (const file of files) {
    const parts = file.webkitRelativePath.split("/");
    const base = parts[1];
    const newFolder = folderMap[base];
    if (!newFolder) continue;

    if (!filesByFolder[newFolder]) {
      filesByFolder[newFolder] = [];
    }

    filesByFolder[newFolder].push(file);
  }

{
  const comboMax = (filesByFolder["10combomax"] || [])
    .filter(f => f.type.startsWith("image/"))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  const combo = (filesByFolder["10combo"] || [])
    .filter(f => f.type.startsWith("image/"))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  if (comboMax.length > 0 && combo.length > 0) {
    let index = 0;

    for (let i = 0; i <= 42; i++) {
      const file = comboMax[i];
      if (!file) continue;

      const blob = await transformImage(file, "dan_select_in");
      zip.file(`dan_select_in/${index}.png`, blob);
      index++;
    }

    for (let i = 21; i >= 0; i--) {
      const file = combo[i];
      if (!file) continue;

      const blob = await transformImage(file, "dan_select_in");
      zip.file(`dan_select_in/${index}.png`, blob);
      index++;
    }
  }
}

  for (const [newFolder, folderFiles] of Object.entries(filesByFolder)) {

    if (newFolder === "dan_select_in") {
      const comboMax = (filesByFolder["10combomax"] || [])
        .filter(f => f.type.startsWith("image/"))
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

      const combo = (filesByFolder["10combo"] || [])
        .filter(f => f.type.startsWith("image/"))
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

      let index = 0;

      for (let i = 0; i <= 42; i++) {
        const file = comboMax[i];
        if (!file) continue;

        const blob = await transformImage(file, newFolder);
        zip.file(`${newFolder}/${index}.png`, blob);
        index++;
      }

      for (let i = 21; i >= 0; i--) {
        const file = combo[i];
        if (!file) continue;

        const blob = await transformImage(file, newFolder);
        zip.file(`${newFolder}/${index}.png`, blob);
        index++;
      }

      continue;
    }

    const images = folderFiles
      .filter(f => f.type.startsWith("image/"))
      .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

    for (let i = 0; i < images.length; i++) {
      const blob = await transformImage(images[i], newFolder);
      zip.file(`${newFolder}/${i}.png`, blob);
    }
  }

  zip.file("Config.json", JSON.stringify(configJson, null, 2));

  const content = await zip.generateAsync({ type: "blob" });

  status.style.display = "none";
  button.disabled = false;

  const a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "0.zip";
  a.click();
}

function transformImage(file, folderName) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = 600;
      canvas.height = 600;
      const ctx = canvas.getContext("2d");

      let scale = 1.0;
      let offsetX = 0;
      let offsetY = 0;

      // songselect 系
      if (
        folderName === "songselect_loop" ||
        folderName === "songselect_wait_loop"
      ) {
        scale = 0.78;
        offsetX = -95;
        offsetY = -78;
      }

      // entry_loop
      if (folderName === "entry_loop") {
        scale = 0.7633587786;
        offsetX = 0;
        offsetY = 0;
      }

      // result 系
      if (folderName.startsWith("result_")) {
        scale = 1.09;
        offsetX = -118;
        offsetY = -82;
      }


      const w = img.width * scale;
      const h = img.height * scale;

      ctx.clearRect(0, 0, 600, 600);
      ctx.drawImage(img, offsetX, offsetY, w, h);

      canvas.toBlob(blob => resolve(blob));
    };
    img.src = URL.createObjectURL(file);
  });
}

  </script>
</body>
</html>
