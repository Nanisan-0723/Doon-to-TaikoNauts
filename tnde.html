<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TNDE to TaikøNauts</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "RocknRoll One", sans-serif;
    background: linear-gradient(135deg, #e6f4ea, #c8e6c9);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #ffffff;
    width: 720px;
    max-width: 95%;
    padding: 40px 50px;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    text-align: center;
  }

  h1 {
    margin-top: 0;
    font-size: 48px;
    color: #2e7d32;
  }

  .subtitle {
    font-size: 22px;
    color: #4e6e52;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .file-box {
    margin: 30px 0;
    padding: 25px;
    border: 2px dashed #81c784;
    border-radius: 16px;
    background: #f1f8f4;
  }

  input[type="file"] {
    font-size: 18px;
  }

  button {
    margin-top: 25px;
    font-size: 26px;
    padding: 16px 60px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #43a047, #2e7d32);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(0,0,0,0.3);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  #status {
    margin-top: 25px;
    font-size: 22px;
    color: #1b5e20;
    background: #e8f5e9;
    padding: 14px;
    border-radius: 12px;
    display: none;
  }

  .footer {
    margin-top: 35px;
    font-size: 14px;
    color: #78909c;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>TNDE → TaikøNauts</h1>
    <div class="subtitle">
      TNDE用マイドンを<br>
      TaikøNauts 用に(かなりマジで本当に無理やり)変換するツールです
    </div>

    <div class="file-box">
      <input type="file" id="folderInput" webkitdirectory multiple>
    </div>

    <button onclick="processFiles()">変換</button>

    <div id="status">変換中…（結構長い）</div>

    <div class="footer">
      「tnde」という名前の色々入ったフォルダをアップロードしてください<br>つまり10comboやloop、Result_Donchan_Clearなどをすべて入れたフォルダ<br>外部にアップロードはしてません(やり方わからんし)
    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const folderMap = {
      "Donchan_Entry": "entry_loop",
      "10combo": "10combo",
      "10combo_Max": "10combomax",
      "Balloon_Breaking": "balloon_breaking",
      "Balloon_Broke": "balloon_broke",
      "Balloon_Miss": "balloon_miss",
      "Clear": "clear",
      "Clearin": "clearin",
      "GoGo": "gogo",
      "GoGoStart": "gogostart",
      "Normal": "normal",
      "Result_Donchan_Clear": "result_clear_loop",
      "Result_Donchan_Failed_Loop": "result_failed_loop",
      "Result_Donchan_Failed": "result_failed_in",
      "Result_Donchan_Normal": "result_loop",
      "Loop": "songselect_loop",
      "Soulin": "soulin"
    };

    const configJson = {
      "name":"tnde",
      "entryX":[-358,1102],
      "entryY":[90,90],
      "entryPlaySideX":417,
      "entryPlaySideY":-1,
      "entryScale":1.965,
      "entryLoopPlaySideTime":800,
      "entryModeLoopTime":500,
      "entryModeDecideLoopTime":1000,
      "songSelectX":[-349,1105],
      "songSelectY":[104,104],
      "songSelectScale":1.92,
      "songSelectLoopTime":1000,
      "songSelectDecideTime":1000,
      "songSelectSkipMotionTime":1000,
      "songSelectWaitLoopTime":560,
      "songSelectSongStartTime":360,
      "songSelectSongStartJumpIndex":21,
      "ensoGameX":[-203,-203],
      "ensoGameY":[-312,492],
      "ensoGameBalloonX":[245,245],
      "ensoGameBalloonY":[7,457],
      "ensoGameNormalScale":1.5,
      "ensoGameBalloonScale":1.5,
      "goGoStartMotionFromBeginning":true,
      "normalMotionBeat":4,
      "combo10MotionBeat":2,
      "combo10MaxMotionBeat":2,
      "goGoStartMotionBeat":2,
      "goGoMotionMotionBeat":8,
      "clearInMotionBeat":2,
      "clearMotionBeat":2,
      "soulInMotionBeat":2,
      "comboCutMotionBeat":2,
      "missLoopMotionBeat":1,
      "failedLoopMotionBeat":1,
      "resultX":[-169,1264],
      "resultY":[322,322],
      "resultScale":1.3761467891,
      "resultLoopTime":500,
      "resultClearLoopTime":700,
      "resultFailedInTime":200,
      "resultFailedLoopTime":500,
      "danSelectX":0,
      "danSelectY":0,
      "danSelectScale":1,
      "danSelectLoopTime":1000,
      "danSelectWaitLoopTime":1000,
      "danSelectDecideTime":1000,
      "danSelectSongStartJumpIndex":1,
      "danSelectSongStartTime":1000,
      "danresultX":0,
      "danresultY":0,
      "danresultScale":1,
      "danresultNormalLoopTime":1000,
      "danresultFailedInTime":1000,
      "danresultFailedLoopTime":1000,
      "danresultRedInTime":1000,
      "danresultRedLoopTime":1000,
      "danresultGoldInTime":1000,
      "danresultGoldLoopTime":1000,
      "playerCustomizeX":[-159,1273],
      "playerCustomizeY":[370,370]
    };

async function processFiles() {
  const status = document.getElementById("status");
  const button = document.querySelector("button");

  status.style.display = "block";
  status.textContent = "変換中…(これが結構長いのよ)";
  button.disabled = true;

  const files = document.getElementById("folderInput").files;
  if (!files.length) {
    status.style.display = "none";
    button.disabled = false;
    alert("フォルダを選択してね");
    return;
  }

  const zip = new JSZip();

  for (const file of files) {
    const parts = file.webkitRelativePath.split("/");
    const base = parts[1];
    const newFolder = folderMap[base];
    if (!newFolder) continue;

    const newPath = [newFolder, ...parts.slice(2)].join("/");

    if (
      file.type.startsWith("image/") &&
      (
        newFolder === "songselect_loop" ||
        newFolder === "songselect_wait_loop" ||
        newFolder === "entry_loop" ||
        newFolder.startsWith("result_") ||
        [
          "10combo",
          "10combomax",
          "clear",
          "clearin",
          "gogo",
          "gogostart",
          "normal",
          "soulin"
        ].includes(newFolder)
      )
    ) {

      const blob = await transformImage(file, newFolder);
      zip.file(newPath, blob);
    } else {
      zip.file(newPath, file);
    }
  }

  zip.file("Config.json", JSON.stringify(configJson, null, 2));

  const content = await zip.generateAsync({ type: "blob" });

  status.style.display = "none";
  button.disabled = false;

  const a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "0.zip";
  a.click();
}


function transformImage(file, folderName) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = 600;
      canvas.height = 600;
      const ctx = canvas.getContext("2d");

      let scale = 1.0;
      let offsetX = 0;
      let offsetY = 0;

      const fit600Folders = [
        "10combo",
        "10combomax",
        "clear",
        "clearin",
        "gogo",
        "gogostart",
        "normal",
        "soulin"
      ];

      // songselect
      if (folderName === "songselect_loop") {
        scale = 0.78;
        offsetX = 178.5;
        offsetY = 56;
      }

      // entry
      else if (folderName === "entry_loop") {
        scale = 0.7633587786;
        offsetX = 0;
        offsetY = 0;
      }

      // result
      else if (folderName.startsWith("result_")) {
        scale = 1.09;
        offsetX = 127;
        offsetY = -231;
      }

      // ★ 新規：600x600 fit
      else if (fit600Folders.includes(folderName)) {
        const scaleX = 600 / img.width;
        const scaleY = 600 / img.height;
        scale = Math.min(scaleX, scaleY, 1);

        const w = img.width * scale;
        const h = img.height * scale;

        offsetX = (600 - w) / 2;
        offsetY = (600 - h) / 2;
      }



      const w = img.width * scale;
      const h = img.height * scale;

      ctx.clearRect(0, 0, 600, 600);
      ctx.drawImage(img, offsetX, offsetY, w, h);

      canvas.toBlob(blob => resolve(blob));
    };
    img.src = URL.createObjectURL(file);
  });
}

  </script>
</body>
</html>
